apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: test-secret
  namespace: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: test-secret
  data:
    - secretKey: username
      remoteRef:
        key: homelab/test-secret
        property: username
    - secretKey: password
      remoteRef:
        key: homelab/test-secret
        property: password
