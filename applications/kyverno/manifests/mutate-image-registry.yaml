apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: mutate-image-registry
  annotations:
    policies.kyverno.io/title: Rewrite Images to Zot Registry
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Automatically rewrites container image references to pull through the Zot
      registry (zot.mrcontainer.nl) for caching and Trivy vulnerability scanning.
      Images are routed to the correct upstream prefix based on their source registry.
      System namespaces are excluded to avoid breaking core infrastructure.
spec:
  rules:
    # Docker Hub implicit - official library images (no domain, no slash, e.g. nginx:latest)
    - name: rewrite-dockerhub-library
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - argocd
                - cert-manager
                - cloudnativepg
                - coredns
                - dnscrypt-proxy
                - external-dns
                - external-secrets
                - kube-prometheus-stack
                - kyverno
                - longhorn-system
                - metallb-system
                - policy-reporter
                - tailscale
                - tekton-operator
                - tekton-pipelines
                - zot
      preconditions:
        all:
          - key: "{{request.operation}}"
            operator: In
            value: ["CREATE", "UPDATE"]
      mutate:
        foreach:
          - list: "request.object.spec.containers[]"
            preconditions:
              all:
                - key: "{{element.image}}"
                  operator: NotEquals
                  value: "zot.mrcontainer.nl/*"
                - key: "{{element.image}}"
                  operator: NotEquals
                  value: "*.*/*"
                - key: "{{element.image}}"
                  operator: NotEquals
                  value: "*/*"
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{element.name}}"
                    image: "zot.mrcontainer.nl/dockerhub/library/{{element.image}}"
          - list: "request.object.spec.initContainers[] || []"
            preconditions:
              all:
                - key: "{{element.image}}"
                  operator: NotEquals
                  value: "zot.mrcontainer.nl/*"
                - key: "{{element.image}}"
                  operator: NotEquals
                  value: "*.*/*"
                - key: "{{element.image}}"
                  operator: NotEquals
                  value: "*/*"
            patchStrategicMerge:
              spec:
                initContainers:
                  - (name): "{{element.name}}"
                    image: "zot.mrcontainer.nl/dockerhub/library/{{element.image}}"
    # Docker Hub implicit - namespaced images (no domain, has slash, e.g. miniflux/miniflux:2.2.6)
    - name: rewrite-dockerhub-namespaced
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - argocd
                - cert-manager
                - cloudnativepg
                - coredns
                - dnscrypt-proxy
                - external-dns
                - external-secrets
                - kube-prometheus-stack
                - kyverno
                - longhorn-system
                - metallb-system
                - policy-reporter
                - tailscale
                - tekton-operator
                - tekton-pipelines
                - zot
      preconditions:
        all:
          - key: "{{request.operation}}"
            operator: In
            value: ["CREATE", "UPDATE"]
      mutate:
        foreach:
          - list: "request.object.spec.containers[]"
            preconditions:
              all:
                - key: "{{element.image}}"
                  operator: NotEquals
                  value: "zot.mrcontainer.nl/*"
                - key: "{{element.image}}"
                  operator: NotEquals
                  value: "*.*/*"
                - key: "{{element.image}}"
                  operator: Equals
                  value: "*/*"
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{element.name}}"
                    image: "zot.mrcontainer.nl/dockerhub/{{element.image}}"
          - list: "request.object.spec.initContainers[] || []"
            preconditions:
              all:
                - key: "{{element.image}}"
                  operator: NotEquals
                  value: "zot.mrcontainer.nl/*"
                - key: "{{element.image}}"
                  operator: NotEquals
                  value: "*.*/*"
                - key: "{{element.image}}"
                  operator: Equals
                  value: "*/*"
            patchStrategicMerge:
              spec:
                initContainers:
                  - (name): "{{element.name}}"
                    image: "zot.mrcontainer.nl/dockerhub/{{element.image}}"
    # Docker Hub explicit (docker.io/...)
    - name: rewrite-dockerhub-explicit
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - argocd
                - cert-manager
                - cloudnativepg
                - coredns
                - dnscrypt-proxy
                - external-dns
                - external-secrets
                - kube-prometheus-stack
                - kyverno
                - longhorn-system
                - metallb-system
                - policy-reporter
                - tailscale
                - tekton-operator
                - tekton-pipelines
                - zot
      preconditions:
        all:
          - key: "{{request.operation}}"
            operator: In
            value: ["CREATE", "UPDATE"]
      mutate:
        foreach:
          - list: "request.object.spec.containers[]"
            preconditions:
              all:
                - key: "{{element.image}}"
                  operator: Equals
                  value: "docker.io/*"
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{element.name}}"
                    image: "{{ regex_replace_all('^docker\\.io/', element.image, 'zot.mrcontainer.nl/dockerhub/') }}"
          - list: "request.object.spec.initContainers[] || []"
            preconditions:
              all:
                - key: "{{element.image}}"
                  operator: Equals
                  value: "docker.io/*"
            patchStrategicMerge:
              spec:
                initContainers:
                  - (name): "{{element.name}}"
