apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    title: "Homelab"
    description: "Welcome to my self-hosted deathstar! 🚀"
    background:
      image: apod
      blur: sm
      opacity: 50
    favicon: https://www.google.com/favicon.ico
    color: slate
    disableCollapse: true
    cardBlur: md
    headerStyle: boxed
    statusStyle: basic
    showStats: true
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: false
      hideVisitURL: false
    layout:
      Infrastructure:
        style: row
        columns: 2
        tab: Core
        icon: mdi-server-network
      Security:
        style: row
        columns: 2
        tab: Core
        icon: mdi-shield-lock
      CI/CD:
        style: row
        columns: 2
        tab: Core
        icon: mdi-pipe
      Observability:
        style: row
        columns: 2
        tab: Monitoring
        icon: mdi-chart-line
      Media:
        style: row
        columns: 4
        tab: Media
        icon: mdi-television
      Apps:
        style: row
        columns: 3
        tab: Apps
        icon: mdi-apps
    providers:
      longhorn:
        url: http://longhorn-frontend.longhorn-system.svc.cluster.local
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Favorite Repos:
        - Homelab-turing:
            - abbr: GH
              href: https://github.com/mrcontainer-tech/homelab-turing
              icon: github
        - Notes:
            - abbr: Notes
              href: https://github.com/scholtenmartijn/zk-vault
              icon: github
    - Admin:
        - Tailscale:
            - abbr: TS
              href: https://login.tailscale.com/admin
              icon: tailscale
        - AWS Console:
            - abbr: AWS
              href: https://eu-west-1.console.aws.amazon.com/
              icon: aws
        - ArgoCD Docs:
            - abbr: Argo
              href: https://argo-cd.readthedocs.io/en/stable/
              icon: argocd
    - Bookmarks:
        - Github:
            - abbr: GH
              href: https://github.com/
              icon: github
        - Claude:
            - abbr: Claude
              href: https://claude.ai/
              icon: claude-ai
        - Tweakers:
            - abbr: Tweakers
              href: https://tweakers.net/
              icon: https://tweakers.net/favicon.ico
  services.yaml: |
    - Infrastructure:
        - ArgoCD:
            href: https://argocd.mrcontainer.nl/
            description: GitOps ftw!
            icon: argocd
            siteMonitor: https://argocd.mrcontainer.nl/
        - Longhorn:
            href: https://longhorn.mrcontainer.nl/
            description: Distributed block storage
            icon: longhorn
            siteMonitor: https://longhorn.mrcontainer.nl/
    - Security:
        - Zot Registry:
            href: https://zot.mrcontainer.nl/
            description: OCI container registry
            icon: zot
            siteMonitor: https://zot.mrcontainer.nl/
        - Kyverno:
            href: https://policy-reporter.mrcontainer.nl/
            description: Policy engine
            icon: kyverno
            siteMonitor: https://policy-reporter.mrcontainer.nl/
    - CI/CD:
        - Tekton Dashboard:
            href: https://tekton.mrcontainer.nl/
            description: CI/CD pipelines
            icon: tekton
    - Observability:
        - Grafana:
            href: https://grafana.mrcontainer.nl/
            description: Metrics visualization
            icon: grafana
            siteMonitor: https://grafana.mrcontainer.nl/
        - Prometheus:
            href: https://prometheus.mrcontainer.nl/
            description: Metrics & alerting
            icon: prometheus
            ping: http://prometheus-operated.kube-prometheus-stack.svc.cluster.local:9090
    - Media:
        - Jellyfin:
            href: https://jellyfin.mrcontainer.nl/
            description: Media server
            icon: jellyfin
            siteMonitor: https://jellyfin.mrcontainer.nl/
            widget:
              type: jellyfin
              url: http://jellyfin.media.svc.cluster.local:8096
              key: {{HOMEPAGE_VAR_JELLYFIN_API_KEY}}
        - Jellyseerr:
            href: https://jellyseerr.mrcontainer.nl/
            description: Media requests
            icon: jellyseerr
            siteMonitor: https://jellyseerr.mrcontainer.nl/
            widget:
              type: jellyseerr
              url: http://jellyseerr.media.svc.cluster.local:5055
              key: {{HOMEPAGE_VAR_JELLYSEERR_API_KEY}}
        - Sonarr:
            href: https://sonarr.mrcontainer.nl/
            description: TV show manager
            icon: sonarr
            siteMonitor: https://sonarr.mrcontainer.nl/
            widget:
              type: sonarr
              url: http://sonarr.media.svc.cluster.local:8989
              key: {{HOMEPAGE_VAR_SONARR_API_KEY}}
        - Prowlarr:
            href: https://prowlarr.mrcontainer.nl/
            description: Indexer manager
            icon: prowlarr
            siteMonitor: https://prowlarr.mrcontainer.nl/
            widget:
              type: prowlarr
              url: http://prowlarr.media.svc.cluster.local:9696
              key: {{HOMEPAGE_VAR_PROWLARR_API_KEY}}
        - Radarr:
            href: https://radarr.mrcontainer.nl/
            description: Movie manager
            icon: radarr
            siteMonitor: https://radarr.mrcontainer.nl/
            widget:
              type: radarr
              url: http://radarr.media.svc.cluster.local:7878
              key: {{HOMEPAGE_VAR_RADARR_API_KEY}}
        - Bazarr:
            href: https://bazarr.mrcontainer.nl/
            description: Subtitle manager
            icon: bazarr
            siteMonitor: https://bazarr.mrcontainer.nl/
            widget:
              type: bazarr
              url: http://bazarr.media.svc.cluster.local:6767
              key: {{HOMEPAGE_VAR_BAZARR_API_KEY}}
        - qBittorrent:
            href: https://qb.mrcontainer.nl/
            description: Torrent client
            icon: qbittorrent
            siteMonitor: https://qb.mrcontainer.nl/
            widget:
              type: qbittorrent
              url: http://qbittorrent.media.svc.cluster.local:8080
              username: {{HOMEPAGE_VAR_QBITTORRENT_USERNAME}}
              password: {{HOMEPAGE_VAR_QBITTORRENT_PASSWORD}}
    - Apps:
        - Miniflux:
            href: https://miniflux.mrcontainer.nl/
            description: RSS reader
            icon: miniflux
            siteMonitor: https://miniflux.mrcontainer.nl/
            widget:
              type: miniflux
              url: http://miniflux.miniflux.svc.cluster.local:8080
              key: {{HOMEPAGE_VAR_MINIFLUX_API_KEY}}
        - Linkding:
            href: https://linkding.mrcontainer.nl/
            description: Bookmark manager
            icon: linkding
            siteMonitor: https://linkding.mrcontainer.nl/
        - Mealie:
            href: https://mealie.mrcontainer.nl/
            description: Recipe manager
            icon: mealie
            siteMonitor: https://mealie.mrcontainer.nl/
  widgets.yaml: |
    - greeting:
        text_size: l
        text: "Homelab Turing PI"

    - datetime:
        text_size: l
        format:
          dateStyle: short
          timeStyle: short
          hour12: false

    - openmeteo:
        label: Almere
        latitude: 52.37
        longitude: 5.22
        units: metric
        timezone: Europe/Amsterdam
        cache: 5

    - kubernetes:
        inCluster: true
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "Cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true

    - longhorn:
        expanded: true
        total: true
        labels: true
        nodes: false
  docker.yaml: ""
