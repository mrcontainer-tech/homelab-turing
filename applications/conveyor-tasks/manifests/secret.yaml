# ExternalSecret definitions for the OpenConveyor smoke test.
#
# Both target Secret names and inner key names are load-bearing — the
# reference agents (claude-code-implementer, claude-code-reviewer) discover
# them by directory layout under /run/secrets/<name>/<key> and turn them
# into env vars by upper-casing the Secret name. Renaming either side
# breaks ANTHROPIC_API_KEY / GITHUB_TOKEN export.
#
# Replace `<your-secret-store>` and the remoteRef.key paths to match your
# backend. Apply alongside the namespace; ESO will materialise the Secrets.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: anthropic-api-key
  namespace: conveyor-tasks
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    # Renaming this breaks $ANTHROPIC_API_KEY discovery in the agent.
    name: anthropic-api-key
    creationPolicy: Owner
  data:
    - secretKey: key
      remoteRef:
        key: homelab/anthropic-api-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-token
  namespace: conveyor-tasks
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    # Renaming this breaks $GITHUB_TOKEN discovery in the agent.
    name: github-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: homelab/github-token
