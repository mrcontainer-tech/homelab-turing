# Harbor values for official goharbor chart on ARM64
# Chart: harbor/harbor v1.18.1
# App: Harbor v2.14.1

externalURL: https://harbor.mrcontainer.nl

# Use ClusterIP with custom ingress (managed separately via cert-manager)
expose:
  type: clusterIP
  tls:
    enabled: false  # TLS termination handled by Traefik ingress
  clusterIP:
    name: harbor
    ports:
      httpPort: 80
      httpsPort: 443

# Persistence using Longhorn
persistence:
  enabled: true
  resourcePolicy: "keep"
  persistentVolumeClaim:
    registry:
      storageClass: "longhorn"
      size: 10Gi
    jobservice:
      jobLog:
        storageClass: "longhorn"
        size: 1Gi

portal: {}

core: {}

jobservice: {}

registry: {}

trivy:
  enabled: true

exporter: {}

nginx: {}

# Internal database
database:
  type: internal
  internal:
    password: "changeit"  # TODO: Use external-secrets

# Internal Redis
redis:
  type: internal
