apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkding
  namespace: linkding
  labels:
    app.kubernetes.io/name: linkding
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: linkding
  template:
    metadata:
      labels:
        app.kubernetes.io/name: linkding
    spec:
      containers:
        - name: linkding
          image: sissbruecker/linkding:1.36.0
          ports:
            - name: http
              containerPort: 9090
          env:
            - name: LD_DB_ENGINE
              value: postgres
            - name: LD_DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: pg-cluster-app
                  key: dbname
            - name: LD_DB_USER
              valueFrom:
                secretKeyRef:
                  name: pg-cluster-app
                  key: username
            - name: LD_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-cluster-app
                  key: password
            - name: LD_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: pg-cluster-app
                  key: host
            - name: LD_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: pg-cluster-app
                  key: port
            - name: LD_SUPERUSER_NAME
              value: admin
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
