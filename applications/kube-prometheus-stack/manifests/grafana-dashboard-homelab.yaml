apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-homelab
  namespace: kube-prometheus-stack
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Homelab"
data:
  homelab-overview.json: |
    {
      "annotations": { "list": [] },
      "description": "Overview of all core infrastructure and applications running on the homelab cluster",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Cluster Summary",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "title": "Running Pods",
          "type": "stat",
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=\"Running\"} == 1)",
              "legendFormat": "Running"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "title": "Failed Pods",
          "type": "stat",
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=\"Failed\"} == 1) OR on() vector(0)",
              "legendFormat": "Failed"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "title": "Pending Pods",
          "type": "stat",
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=\"Pending\"} == 1) OR on() vector(0)",
              "legendFormat": "Pending"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "orange", "value": 75 },
                  { "color": "red", "value": 90 }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "id": 4,
          "options": {
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "title": "Cluster CPU Usage",
          "type": "gauge",
          "targets": [
            {
              "expr": "100 * (1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])))",
              "legendFormat": "CPU"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "orange", "value": 75 },
                  { "color": "red", "value": 90 }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "id": 5,
          "options": {
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "title": "Cluster Memory Usage",
          "type": "gauge",
          "targets": [
            {
              "expr": "100 * (1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes))",
              "legendFormat": "Memory"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 101,
          "title": "Core Infrastructure",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": {
                "align": "auto",
                "cellOptions": { "type": "auto" },
                "inspect": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Namespace" },
                "properties": [{ "id": "custom.width", "value": 180 }]
              },
              {
                "matcher": { "id": "byName", "options": "Deployment" },
                "properties": [{ "id": "custom.width", "value": 280 }]
              },
              {
                "matcher": { "id": "byName", "options": "Ready" },
                "properties": [
                  { "id": "custom.width", "value": 80 },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "red", "value": null },
                        { "color": "green", "value": 1 }
                      ]
                    }
                  },
                  { "id": "color.mode", "value": "thresholds" },
                  { "id": "custom.cellOptions", "value": { "mode": "basic", "type": "color-background" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Desired" },
                "properties": [{ "id": "custom.width", "value": 80 }]
              },
              {
                "matcher": { "id": "byName", "options": "CPU" },
                "properties": [
                  { "id": "custom.width", "value": 100 },
                  { "id": "unit", "value": "short" },
                  { "id": "decimals", "value": 3 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Memory" },
                "properties": [
                  { "id": "custom.width", "value": 100 },
                  { "id": "unit", "value": "bytes" },
                  { "id": "decimals", "value": 0 }
                ]
              }
            ]
          },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 6 },
          "id": 10,
          "options": {
            "showHeader": true,
            "sortBy": [{ "desc": false, "displayName": "Namespace" }],
            "footer": { "show": false }
          },
          "title": "Core Infrastructure Deployments",
          "type": "table",
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=~\"argocd|cert-manager|cloudnativepg|coredns|dnscrypt-proxy|external-dns|external-secrets|longhorn-system|metallb-system|tailscale|tekton-operator\"}",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            },
            {
              "expr": "kube_deployment_spec_replicas{namespace=~\"argocd|cert-manager|cloudnativepg|coredns|dnscrypt-proxy|external-dns|external-secrets|longhorn-system|metallb-system|tailscale|tekton-operator\"}",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "B"
            },
            {
              "expr": "sum by (namespace, pod) (rate(container_cpu_usage_seconds_total{namespace=~\"argocd|cert-manager|cloudnativepg|coredns|dnscrypt-proxy|external-dns|external-secrets|longhorn-system|metallb-system|tailscale|tekton-operator\", container!=\"\", container!=\"POD\"}[5m]))",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "C"
            },
            {
              "expr": "sum by (namespace, pod) (container_memory_working_set_bytes{namespace=~\"argocd|cert-manager|cloudnativepg|coredns|dnscrypt-proxy|external-dns|external-secrets|longhorn-system|metallb-system|tailscale|tekton-operator\", container!=\"\", container!=\"POD\"})",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "D"
            }
          ],
          "transformations": [
            {
              "id": "seriesToColumns",
              "options": { "byField": "deployment" }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "Time 1": true,
                  "Time 2": true,
                  "__name__": true,
                  "__name__ 1": true,
                  "__name__ 2": true,
                  "instance": true,
                  "instance 1": true,
                  "instance 2": true,
                  "job": true,
                  "job 1": true,
                  "job 2": true
                },
                "renameByName": {
                  "namespace 1": "Namespace",
                  "deployment": "Deployment",
                  "Value #A": "Ready",
                  "Value #B": "Desired"
                }
              }
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "none",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "stacking": { "group": "A", "mode": "normal" }
              },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "id": 11,
          "options": {
            "legend": { "calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Core Infrastructure - Memory Usage",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum by (namespace) (container_memory_working_set_bytes{namespace=~\"argocd|cert-manager|cloudnativepg|coredns|dnscrypt-proxy|external-dns|external-secrets|longhorn-system|metallb-system|tailscale|tekton-operator\", container!=\"\", container!=\"POD\"})",
              "legendFormat": "{{ namespace }}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "none",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "stacking": { "group": "A", "mode": "normal" }
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "id": 12,
          "options": {
            "legend": { "calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Core Infrastructure - CPU Usage",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{namespace=~\"argocd|cert-manager|cloudnativepg|coredns|dnscrypt-proxy|external-dns|external-secrets|longhorn-system|metallb-system|tailscale|tekton-operator\", container!=\"\", container!=\"POD\"}[5m]))",
              "legendFormat": "{{ namespace }}"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 24 },
          "id": 102,
          "title": "Applications",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": {
                "align": "auto",
                "cellOptions": { "type": "auto" },
                "inspect": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Namespace" },
                "properties": [{ "id": "custom.width", "value": 200 }]
              },
              {
                "matcher": { "id": "byName", "options": "Deployment" },
                "properties": [{ "id": "custom.width", "value": 280 }]
              },
              {
                "matcher": { "id": "byName", "options": "Ready" },
                "properties": [
                  { "id": "custom.width", "value": 80 },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "red", "value": null },
                        { "color": "green", "value": 1 }
                      ]
                    }
                  },
                  { "id": "color.mode", "value": "thresholds" },
                  { "id": "custom.cellOptions", "value": { "mode": "basic", "type": "color-background" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Desired" },
                "properties": [{ "id": "custom.width", "value": 80 }]
              }
            ]
          },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 25 },
          "id": 20,
          "options": {
            "showHeader": true,
            "sortBy": [{ "desc": false, "displayName": "Namespace" }],
            "footer": { "show": false }
          },
          "title": "Application Deployments",
          "type": "table",
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=~\"homepage|kube-prometheus-stack|kyverno|linkding|mealie|media-server|miniflux|policy-reporter|tekton-pipelines|zot\"}",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            },
            {
              "expr": "kube_deployment_spec_replicas{namespace=~\"homepage|kube-prometheus-stack|kyverno|linkding|mealie|media-server|miniflux|policy-reporter|tekton-pipelines|zot\"}",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "B"
            }
          ],
          "transformations": [
            {
              "id": "seriesToColumns",
              "options": { "byField": "deployment" }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "Time 1": true,
                  "Time 2": true,
                  "__name__": true,
                  "__name__ 1": true,
                  "__name__ 2": true,
                  "instance": true,
                  "instance 1": true,
                  "instance 2": true,
                  "job": true,
                  "job 1": true,
                  "job 2": true
                },
                "renameByName": {
                  "namespace 1": "Namespace",
                  "deployment": "Deployment",
                  "Value #A": "Ready",
                  "Value #B": "Desired"
                }
              }
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "none",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "stacking": { "group": "A", "mode": "normal" }
              },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 35 },
          "id": 21,
          "options": {
            "legend": { "calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Applications - Memory Usage",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum by (namespace) (container_memory_working_set_bytes{namespace=~\"homepage|kube-prometheus-stack|kyverno|linkding|mealie|media-server|miniflux|policy-reporter|tekton-pipelines|zot\", container!=\"\", container!=\"POD\"})",
              "legendFormat": "{{ namespace }}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "none",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "stacking": { "group": "A", "mode": "normal" }
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 35 },
          "id": 22,
          "options": {
            "legend": { "calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "title": "Applications - CPU Usage",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{namespace=~\"homepage|kube-prometheus-stack|kyverno|linkding|mealie|media-server|miniflux|policy-reporter|tekton-pipelines|zot\", container!=\"\", container!=\"POD\"}[5m]))",
              "legendFormat": "{{ namespace }}"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 43 },
          "id": 103,
          "title": "Pod Restarts",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": {
                "align": "auto",
                "cellOptions": { "type": "auto" },
                "inspect": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 3 },
                  { "color": "orange", "value": 5 },
                  { "color": "red", "value": 10 }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Restarts" },
                "properties": [
                  { "id": "color.mode", "value": "thresholds" },
                  { "id": "custom.cellOptions", "value": { "mode": "basic", "type": "color-background" } }
                ]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 44 },
          "id": 30,
          "options": {
            "showHeader": true,
            "sortBy": [{ "desc": true, "displayName": "Restarts" }],
            "footer": { "show": false }
          },
          "title": "Containers with Restarts (last 24h)",
          "type": "table",
          "targets": [
            {
              "expr": "sort_desc(sum by (namespace, pod, container) (increase(kube_pod_container_status_restarts_total[24h])) > 0)",
              "format": "table",
              "instant": true,
              "legendFormat": ""
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true
                },
                "renameByName": {
                  "namespace": "Namespace",
                  "pod": "Pod",
                  "container": "Container",
                  "Value": "Restarts"
                }
              }
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["homelab", "kubernetes"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "Homelab Overview",
      "uid": "homelab-overview",
      "version": 1
    }
