grafana:
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'kubernetes'
          orgId: 1
          folder: 'Kubernetes'
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/kubernetes
  dashboards:
    kubernetes:
      k8s-views-global:
        gnetId: 15760
        revision: 37
        datasource: Prometheus
      k8s-views-namespaces:
        gnetId: 15759
        revision: 31
        datasource: Prometheus
      k8s-views-nodes:
        gnetId: 15757
        revision: 37
        datasource: Prometheus
      k8s-views-pods:
        gnetId: 15758
        revision: 35
        datasource: Prometheus
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folderAnnotation: grafana_folder
