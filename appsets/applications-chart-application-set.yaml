apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applications
  namespace: argocd
  annotations:
    # Platform tier — current contents (kyverno, policy-reporter) are platform
    # policy infrastructure, hence wave 10 alongside applications-infrastructure.
    # The naming asymmetry is documented in adr/D26-appset-sync-waves.md.
    argocd.argoproj.io/sync-wave: "10"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          # Infrastructure-tier charts (kube-prometheus-stack, zot) live in
          # the sibling appsets/applications-infrastructure-chart-application-set.yaml
          # — their namespaces are excluded from the Kyverno image-mutation
          # policy, so the ignoreDifferences block below has no fill-in and
          # leaves their workloads stuck OutOfSync (or, for newly-rendered
          # initContainers, fails to apply with "image: Required value").
          # See adr/D25-applications-infrastructure-appset.md.
          - name: kyverno
            chart: kyverno
            repoURL: https://kyverno.github.io/kyverno/
            version: 3.6.2
            releaseName: kyverno-chart
          - name: policy-reporter
            chart: policy-reporter
            repoURL: https://kyverno.github.io/policy-reporter
            version: 3.7.1
            releaseName: policy-reporter-chart
  template:
    metadata:
      # e.g. name="harbor-chart"
      name: '{{ .name }}-chart'
      annotations:
        argocd.argoproj.io/sync-wave: "10"
    spec:
      project: default
      sources:
        - repoURL: '{{ .repoURL }}'
          chart: '{{ .chart }}'
          targetRevision: '{{ .version }}'
          helm:
            releaseName: '{{ .releaseName }}'
            valueFiles:
              - $values/applications/{{ .name }}/values.yaml
        - repoURL: https://github.com/mrcontainer-tech/homelab-turing.git
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .name }}'
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jqPathExpressions:
            - .spec.template.spec.containers[].image
            - .spec.template.spec.initContainers[]?.image
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - .spec.template.spec.containers[].image
            - .spec.template.spec.initContainers[]?.image
        - group: apps
          kind: DaemonSet
          jqPathExpressions:
            - .spec.template.spec.containers[].image
            - .spec.template.spec.initContainers[]?.image
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
