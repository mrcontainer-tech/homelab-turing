apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: core-components-manifests
  namespace: argocd
  annotations:
    # Foundation tier — runs before platform and workloads.
    # See adr/D26-appset-sync-waves.md.
    argocd.argoproj.io/sync-wave: "0"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/mrcontainer-tech/homelab-turing.git
        revision: main
        directories:
          - path: core-components/*/manifests
  template:
    metadata:
      # e.g. path="core-components/metallb/manifests" → name="metallb-manifest"
      name: '{{ base (dir .path.path) }}-manifest'
      annotations:
        argocd.argoproj.io/sync-wave: "0"
    spec:
      # Using the default project for now
      project: default
      source:
        repoURL: https://github.com/mrcontainer-tech/homelab-turing.git
        targetRevision: main
        path: '{{ .path.path }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ base (dir .path.path) }}'
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.data[].remoteRef.conversionStrategy
            - .spec.data[].remoteRef.decodingStrategy
            - .spec.data[].remoteRef.metadataPolicy
            - .spec.dataFrom
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jqPathExpressions:
            - .spec.conversion
            - .spec.preserveUnknownFields
        - group: apps
          kind: Deployment
          jqPathExpressions:
            - .spec.template.spec.containers[].image
            - .spec.template.spec.initContainers[]?.image
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - .spec.template.spec.containers[].image
            - .spec.template.spec.initContainers[]?.image
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
          - RespectIgnoreDifferences=true