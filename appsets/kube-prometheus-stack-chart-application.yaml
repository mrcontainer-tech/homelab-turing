# Standalone Application for kube-prometheus-stack.
# Extracted from appsets/applications-chart-application-set.yaml so that the
# shared `ignoreDifferences` block (designed to coexist with the Kyverno
# image-mutation policy) does not apply here — this namespace is excluded
# from that policy and the stripping breaks Helm charts that render new
# initContainers. See adr/D25-kps-standalone-application.md.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack-chart
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-prometheus-stack
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 75.7.0
      helm:
        releaseName: kube-prometheus-stack
        valueFiles:
          - $values/applications/kube-prometheus-stack/values.yaml
    - repoURL: https://github.com/mrcontainer-tech/homelab-turing.git
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
