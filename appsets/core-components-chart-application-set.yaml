apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: core-components
  namespace: argocd
  annotations:
    # Foundation tier — runs before platform and workloads.
    # See adr/D26-appset-sync-waves.md.
    argocd.argoproj.io/sync-wave: "0"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - name: cert-manager
            chart: cert-manager
            repoURL: https://charts.jetstack.io
            version: v1.18.0
            releaseName: cert-manager
          - name: external-dns
            chart: external-dns
            repoURL: https://kubernetes-sigs.github.io/external-dns/
            version: "1.17.0"
            releaseName: external-dns
          - name: external-secrets
            chart: external-secrets
            repoURL: https://charts.external-secrets.io
            version: 0.18.1
            releaseName: external-secrets
          - name: metallb-system
            chart: metallb
            repoURL: https://metallb.github.io/metallb
            version: 0.15.2
            releaseName: metallb
          - name: longhorn-system
            chart: longhorn
            repoURL: https://charts.longhorn.io
            version: 1.8.2
            releaseName: longhorn
          - name: tailscale
            chart: tailscale-operator
            repoURL: https://pkgs.tailscale.com/helmcharts
            version: "1.82.0"
            releaseName: tailscale-operator
          - name: cloudnativepg
            chart: cloudnative-pg
            repoURL: https://cloudnative-pg.github.io/charts
            version: "0.28.0"
            releaseName: cloudnative-pg
  template:
    metadata:
      # e.g. name="cert-manager-chart"
      name: '{{ .name }}-chart'
      annotations:
        argocd.argoproj.io/sync-wave: "0"
    spec:
      project: default
      sources:
        - repoURL: '{{ .repoURL }}'
          chart: '{{ .chart }}'
          targetRevision: '{{ .version }}'
          helm:
            releaseName: '{{ .releaseName }}'
            valueFiles:
              - $values/core-components/{{ .name }}/values.yaml
        - repoURL: https://github.com/mrcontainer-tech/homelab-turing.git
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .name }}'
      ignoreDifferences:
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jqPathExpressions:
            - .spec.conversion
            - .spec.preserveUnknownFields
        - group: apps
          kind: Deployment
          jqPathExpressions:
            - .spec.template.spec.containers[].image
            - .spec.template.spec.initContainers[]?.image
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - .spec.template.spec.containers[].image
            - .spec.template.spec.initContainers[]?.image
        - group: apps
          kind: DaemonSet
          jqPathExpressions:
            - .spec.template.spec.containers[].image
            - .spec.template.spec.initContainers[]?.image
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
