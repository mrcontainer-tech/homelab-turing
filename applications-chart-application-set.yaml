apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applications
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - name: harbor
            chart: harbor
            repoURL: https://helm.goharbor.io
            version: 1.18.1
            releaseName: harbor-chart
          - name: kube-prometheus-stack
            chart: kube-prometheus-stack
            repoURL: https://prometheus-community.github.io/helm-charts
            version: 75.7.0
            releaseName: kube-prometheus-stack
          - name: kyverno
            chart: kyverno
            repoURL: https://kyverno.github.io/kyverno/
            version: 3.6.2
            releaseName: kyverno-chart
          - name: policy-reporter
            chart: policy-reporter
            repoURL: https://kyverno.github.io/policy-reporter
            version: 3.7.1
            releaseName: policy-reporter-chart
  template:
    metadata:
      # e.g. name="harbor-chart"
      name: '{{ .name }}-chart'
    spec:
      project: default
      sources:
        - repoURL: '{{ .repoURL }}'
          chart: '{{ .chart }}'
          targetRevision: '{{ .version }}'
          helm:
            releaseName: '{{ .releaseName }}'
            valueFiles:
              - $values/applications/{{ .name }}/values.yaml
        - repoURL: https://github.com/mrcontainer-tech/homelab-turing.git
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .name }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
